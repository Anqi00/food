<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食物热量识别</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    /* Upload zone */
    #drop-zone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone.hover { border-color: #4f8ef7; background: #f0f6ff; }
    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    #drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    #drop-zone p { color: #666; font-size: 0.9rem; }

    #preview-wrap {
      display: none;
      margin-top: 1rem;
      text-align: center;
    }
    #preview-wrap img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 10px;
      object-fit: contain;
    }

    /* Weight input */
    .weight-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.2rem;
    }
    .weight-row label { font-size: 0.9rem; color: #555; white-space: nowrap; }
    .weight-row input[type="number"] {
      flex: 1;
      padding: 0.55rem 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    .weight-row span { font-size: 0.9rem; color: #555; }
    #estimate-btn {
      padding: 0.4rem 0.7rem;
      background: #fff;
      color: #4f8ef7;
      border: 1.5px solid #4f8ef7;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    #estimate-btn:hover:not(:disabled) { background: #4f8ef7; color: #fff; }
    #estimate-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }
    #estimate-hint {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.3rem;
      padding-left: 2px;
      min-height: 1.1rem;
    }

    /* Submit button */
    button#submit-btn {
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.75rem;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button#submit-btn:hover:not(:disabled) { background: #2d6ee0; }
    button#submit-btn:disabled { background: #a0bef8; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { margin-top: 2rem; }
    .result-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.8rem; color: #333; }

    .food-card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: box-shadow 0.15s;
    }
    .food-card:first-of-type { border-color: #4f8ef7; background: #f0f6ff; }
    .food-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .food-info { flex: 1; }
    .food-name { font-weight: 600; font-size: 1rem; }
    .food-name-en { font-size: 0.78rem; color: #888; margin-top: 1px; }

    .conf-bar-wrap { flex: 1; }
    .conf-bar-bg {
      background: #eee;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-top: 4px;
    }
    .conf-bar {
      height: 100%;
      background: #4f8ef7;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .conf-pct { font-size: 0.8rem; color: #555; margin-top: 2px; }

    .calories-badge {
      text-align: right;
      white-space: nowrap;
    }
    .calories-total { font-size: 1.2rem; font-weight: 700; color: #e55; }
    .calories-unit { font-size: 0.75rem; color: #888; }
    .calories-ref { font-size: 0.75rem; color: #aaa; }

    .error-msg {
      color: #c00;
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>🍱 食物热量识别</h1>
  <p class="subtitle">上传食物图片，AI 自动识别并估算热量</p>

  <div class="card">
    <div id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon">📷</div>
      <p>点击或拖拽图片到此处</p>
      <p style="margin-top:4px;font-size:0.8rem;color:#bbb;">支持 JPG / PNG / WEBP</p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="预览" />
    </div>

    <div class="weight-row">
      <label for="weight-input">食物重量</label>
      <input type="number" id="weight-input" value="100" min="1" max="5000" step="1" />
      <span>克 (g)</span>
      <button id="estimate-btn" title="根据识别结果填入典型份量">估计重量</button>
    </div>
    <div id="estimate-hint"></div>

    <button id="submit-btn" disabled>
      <span id="btn-text">请先选择图片</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div id="results"></div>
  </div>

  <script>
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview-img');
    const weightInput = document.getElementById('weight-input');
    const submitBtn   = document.getElementById('submit-btn');
    const btnText     = document.getElementById('btn-text');
    const spinner     = document.getElementById('spinner');
    const results     = document.getElementById('results');
    const estimateBtn = document.getElementById('estimate-btn');
    const estimateHint = document.getElementById('estimate-hint');

    let selectedFile = null;
    let typicalWeight = null;   // set after recognition

    estimateBtn.disabled = true;
    estimateBtn.addEventListener('click', () => {
      if (!typicalWeight) return;
      weightInput.value = typicalWeight;
      // re-submit with new weight if we already have a file
      if (selectedFile) submitBtn.click();
    });

    function setFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewWrap.style.display = 'block';
      submitBtn.disabled = false;
      btnText.textContent = '识别食物 →';
      results.innerHTML = '';
      typicalWeight = null;
      estimateBtn.disabled = true;
      estimateHint.textContent = '';
    }

    fileInput.addEventListener('change', e => setFile(e.target.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      setFile(e.dataTransfer.files[0]);
    });

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      submitBtn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      results.innerHTML = '';

      const form = new FormData();
      form.append('file', selectedFile);
      form.append('weight', weightInput.value);

      try {
        const resp = await fetch('/predict', { method: 'POST', body: form });
        const data = await resp.json();

        if (data.error) {
          results.innerHTML = `<div class="error-msg">${data.error}</div>`;
          return;
        }

        renderResults(data.predictions);
        // enable estimate button with top result's typical serving
        const top = data.predictions[0];
        if (top && top.typical_serving_g) {
          typicalWeight = top.typical_serving_g;
          estimateBtn.disabled = false;
          estimateHint.textContent = `${top.name_zh} 典型份量约 ${typicalWeight}g（参考值）`;
        }
      } catch (err) {
        results.innerHTML = `<div class="error-msg">请求失败，请检查后端是否启动。</div>`;
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btnText.textContent = '重新识别 →';
      }
    });

    function renderResults(preds) {
      if (!preds || preds.length === 0) {
        results.innerHTML = '<div class="error-msg">未能识别出食物，请换张图片。</div>';
        return;
      }
      let html = '<p class="result-title">识别结果（Top 5）</p>';
      preds.forEach((p, i) => {
        const calTxt = p.total_calories != null
          ? `<div class="calories-total">${p.total_calories} <span style="font-size:0.85rem;font-weight:400">kcal</span></div>
             <div class="calories-ref">${p.calories_per_100g} kcal/100g</div>`
          : `<div class="calories-unit">热量未知</div>`;
        html += `
          <div class="food-card">
            <div class="food-info">
              <div class="food-name">${p.name_zh}</div>
              <div class="food-name-en">${p.label.replace(/_/g,' ')}</div>
            </div>
            <div class="conf-bar-wrap">
              <div class="conf-bar-bg"><div class="conf-bar" style="width:${p.confidence}%"></div></div>
              <div class="conf-pct">${p.confidence}%</div>
            </div>
            <div class="calories-badge">${calTxt}</div>
          </div>`;
      });
      results.innerHTML = html;
    }
  </script>
</body>
</html>
